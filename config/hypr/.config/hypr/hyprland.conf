# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# Change your own setup in these files (and overwrite any settings from defaults!)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/bindings.conf
source = ~/.config/hypr/envs.conf
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/bindings/media.conf
source = ~/.config/hypr/bindings/clipboard.conf
source = ~/.config/hypr/bindings/tiling-v2.conf
source = ~/.config/hypr/bindings/utilities.conf

# Make all Steam windows float by default
windowrulev2 = float, class:^(steam)$

# Size constraints: Note that 'size' requires dimensions (width height)
# If your goal was to 'reset' size, Hyprland usually needs explicit dimensions.
# I've set common defaults here; adjust the px values as needed.
windowrulev2 = size 1280 720, class:^(steam)$, title:^(Steam)$
windowrulev2 = size 300 800, class:^(steam)$, title:^(Friends List)$

# Position/Center constraints
windowrulev2 = center, class:^(steam)$, title:^(Steam)$

# Opacity (Active and Inactive)
windowrulev2 = opacity 1.0 1.0, class:^(steam)$

# Prevent system sleep/idle when Steam is fullscreen (e.g., Big Picture or Games)
windowrulev2 = idleinhibit fullscreen, class:^(steam)$

# Focus rules
windowrulev2 = noinitialfocus, class:^(steam)$

# Notification toasts: Handling specific Steam popups
# Using ^(notificationtoasts) to match the start of the title string
windowrulev2 = nofocus, class:^(steam)$, title:^(notificationtoasts).*$
# Created files to change (and overwrite any settings from defaults!)
source = ~/.config/hypr/devices.conf
