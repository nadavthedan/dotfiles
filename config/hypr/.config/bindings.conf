# Application bindings
$terminal = uwsm app -- $TERMINAL
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm app -- nautilus --new-window
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus obsidian "uwsm app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, slash, Passwords, exec, uwsm app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER SHIFT, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com/app"
bindd = SUPER SHIFT ALT, A, ChatGPT-Temp, exec, omarchy-launch-webapp "https://chatgpt.com/?temporary-chat=true"
bindd = SUPER SHIFT, S, Claude, exec, omarchy-launch-webapp "https://claude.ai/new"
bindd = SUPER SHIFT ALT, S, Claude-Temp, exec, omarchy-launch-webapp "https://claude.ai/new?incognito"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"

bindd = SUPER SHIFT ALT, T, toggle tabbed view, togglegroup

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER SHIFT, SPACE
# bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu

# Remap key bindings that are conflicting with wanted binds:
unbind = SUPER, K
bindd = SUPER CTRL SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings
unbind = SUPER, J
bindd = SUPER, S, Toggle split, togglesplit # dwindle

# Move focus with Super + vim direction
bindd = SUPER, H, Move focus left, movefocus, l
bindd = SUPER, J, Move focus down, movefocus, d
bindd = SUPER, K, Move focus up, movefocus, u
bindd = SUPER, L, Move focus right, movefocus, r

# Swap active window with the one next to it with SUPER + SHIFT + vim direction
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r

# Remap Close window
unbind = SUPER, W
bindd = SUPER, Q, Close active window, killactive

bindd = SUPER SHIFT, B, Qute Browser, exec, uwsm app -- qutebrowser

unbind = SUPER SHIFT, G
bind = SUPER SHIFT, G, exec, [workspace 5] gamescope --backend sdl -W 3840 -H 2160 -r 240 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui

